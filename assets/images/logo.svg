<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7ef8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#004d40;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00251a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Background Shield -->
  <path d="M256 0 C150 0 50 80 50 200 C50 350 256 512 256 512 C256 512 462 350 462 200 C462 80 362 0 256 0 Z" fill="url(#greenGradient)" stroke="url(#goldGradient)" stroke-width="12"/>
  
  <!-- Decorative Inner Border -->
  <path d="M256 30 C170 30 80 100 80 200 C80 320 256 460 256 460 C256 460 432 320 432 200 C432 100 342 30 256 30 Z" fill="none" stroke="url(#goldGradient)" stroke-width="3" stroke-dasharray="10 5"/>

  <!-- Mosque Silhouette -->
  <g transform="translate(156, 120) scale(0.4)" fill="url(#goldGradient)">
    <!-- Dome -->
    <path d="M256 100 C150 100 80 200 80 300 L432 300 C432 200 362 100 256 100 Z"/>
    <!-- Minaret Left -->
    <rect x="50" y="250" width="40" height="250" rx="10"/>
    <path d="M40 250 L100 250 L70 200 Z"/>
    <!-- Minaret Right -->
    <rect x="422" y="250" width="40" height="250" rx="10"/>
    <path d="M412 250 L472 250 L442 200 Z"/>
    <!-- Crescent on top -->
    <path d="M256 40 C280 40 300 60 300 80 C300 100 280 120 256 120 C240 120 230 110 230 110 C245 110 255 100 255 85 C255 70 245 60 230 60 C230 60 240 40 256 40 Z" />
  </g>

  <!-- Typography Placeholder (Stylized Shapes as Calligraphy) -->
  <g transform="translate(120, 310)" fill="white">
     <text x="136" y="60" font-family="'Jameel Noori Nastaleeq', 'Noto Nastaliq Urdu', serif" font-size="60" text-anchor="middle" fill="url(#goldGradient)">مدرسۃ الحسنین</text>
  </g>

  <!-- Bottom Accent -->
  <path d="M200 420 Q256 450 312 420" fill="none" stroke="url(#goldGradient)" stroke-width="5" stroke-linecap="round"/>
</svg>
